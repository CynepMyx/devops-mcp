name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python3 scripts/check_syntax.py

      - name: Import smoke test
        run: python3 scripts/smoke_test.py

      - name: Security module check
        run: python3 -c "import security; print('security.py OK')"
